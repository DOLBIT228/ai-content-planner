<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Content OS Test UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.4; }
    section { border: 1px solid #ccc; padding: 16px; margin-bottom: 16px; }
    label { display: block; margin-top: 8px; }
    input, textarea, select, button { margin-top: 4px; padding: 6px; width: 100%; max-width: 720px; }
    button { width: auto; cursor: pointer; margin-right: 8px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    pre { background: #f5f5f5; padding: 12px; overflow-x: auto; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row label { flex: 1; min-width: 160px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>AI Content OS — Basic Functional UI</h1>
  <p class="muted">Мінімальний інтерфейс для перевірки workflow: Campaign → Plan → Generate → Review.</p>

  <section>
    <h2>1. Create Campaign</h2>
    <label>Title <input id="title" value="Luxury Skincare Launch" /></label>
    <div class="row">
      <label>Start date <input id="startDate" type="date" value="2026-07-01" /></label>
      <label>End date <input id="endDate" type="date" value="2026-07-07" /></label>
    </div>
    <label>Brief <textarea id="brief" rows="4">Premium skincare for busy founders. Elegant, concise, confident.</textarea></label>
    <div class="row">
      <label>Sales % <input id="salesPercentage" type="number" value="50" min="0" max="100" /></label>
      <label>Image % <input id="imagePercentage" type="number" value="25" min="0" max="100" /></label>
    </div>
    <h3>Channel volume</h3>
    <label>Channel name <input id="channelName" value="Instagram" /></label>
    <div class="row">
      <label>Posts <input id="postCount" type="number" value="1" min="0" /></label>
      <label>Carousels <input id="carouselCount" type="number" value="1" min="0" /></label>
      <label>Reels <input id="reelCount" type="number" value="1" min="0" /></label>
      <label>Stories <input id="storiesCount" type="number" value="1" min="0" /></label>
    </div>
    <button id="createCampaignBtn">Create campaign</button>
    <button id="refreshCampaignsBtn">Refresh campaigns</button>
  </section>

  <section>
    <h2>2. Campaigns</h2>
    <label>Active campaign
      <select id="campaignSelect"></select>
    </label>
    <button id="loadCampaignBtn">Load selected campaign</button>
    <button id="generatePlanBtn">Generate plan</button>
    <div id="campaignDetails"></div>
  </section>

  <section>
    <h2>3. Content Entries</h2>
    <p class="muted">Generate пише текст тільки для конкретного entry. Planning не генерує post_text.</p>
    <div id="entries"></div>
  </section>

  <section>
    <h2>Raw API response</h2>
    <pre id="output">Ready.</pre>
  </section>

  <script>
    const output = document.getElementById('output');
    const campaignSelect = document.getElementById('campaignSelect');
    const campaignDetails = document.getElementById('campaignDetails');
    const entriesContainer = document.getElementById('entries');

    function numberValue(id) {
      return Number(document.getElementById(id).value || 0);
    }

    function show(data) {
      output.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      if (response.status === 204) return null;
      const data = await response.json();
      if (!response.ok) throw new Error(JSON.stringify(data));
      return data;
    }

    async function createCampaign() {
      const payload = {
        title: document.getElementById('title').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        brief: document.getElementById('brief').value,
        sales_percentage: numberValue('salesPercentage'),
        image_percentage: numberValue('imagePercentage'),
        channels: [{
          channel_name: document.getElementById('channelName').value,
          post_count: numberValue('postCount'),
          carousel_count: numberValue('carouselCount'),
          reel_count: numberValue('reelCount'),
          stories_count: numberValue('storiesCount'),
        }],
      };
      const campaign = await api('/campaigns', { method: 'POST', body: JSON.stringify(payload) });
      show(campaign);
      await refreshCampaigns(campaign.id);
      await loadCampaign(campaign.id);
    }

    async function refreshCampaigns(selectedId) {
      const campaigns = await api('/campaigns');
      campaignSelect.innerHTML = '';
      campaigns.forEach((campaign) => {
        const option = document.createElement('option');
        option.value = campaign.id;
        option.textContent = `#${campaign.id} — ${campaign.title} (${campaign.status})`;
        if (selectedId && Number(selectedId) === campaign.id) option.selected = true;
        campaignSelect.appendChild(option);
      });
      show(campaigns);
    }

    async function loadCampaign(id = campaignSelect.value) {
      if (!id) return;
      const data = await api(`/campaigns/${id}`);
      campaignDetails.innerHTML = `<pre>${JSON.stringify(data.campaign, null, 2)}</pre>`;
      renderEntries(data.entries || []);
      show(data);
    }

    async function generatePlan() {
      const id = campaignSelect.value;
      if (!id) return show('Create or select a campaign first.');
      const entries = await api(`/campaigns/${id}/generate-plan`, { method: 'POST' });
      show(entries);
      await loadCampaign(id);
      await refreshCampaigns(id);
    }

    function renderEntries(entries) {
      if (!entries.length) {
        entriesContainer.innerHTML = '<p>No entries yet. Generate a plan first.</p>';
        return;
      }
      const rows = entries.map((entry) => `
        <tr>
          <td>#${entry.id}</td>
          <td>${entry.publish_date}</td>
          <td>${entry.format}</td>
          <td>${entry.goal}</td>
          <td><strong>${entry.topic}</strong><br>${entry.short_description}<br><em>${entry.angle}</em></td>
          <td>${entry.status}</td>
          <td><pre>${entry.post_text || 'No generated text yet.'}</pre></td>
          <td>
            <button data-action="generate" data-id="${entry.id}">Generate</button>
            <button data-action="approve" data-id="${entry.id}">Approve</button>
            <button data-action="reject" data-id="${entry.id}">Reject</button>
            <button data-action="delete" data-id="${entry.id}">Delete</button>
            <label>Feedback
              <textarea id="feedback-${entry.id}" rows="2">make it more premium, less text</textarea>
            </label>
            <button data-action="regenerate" data-id="${entry.id}">Regenerate</button>
          </td>
        </tr>
      `).join('');
      entriesContainer.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Date</th><th>Format</th><th>Goal</th><th>Plan</th><th>Status</th><th>Post text</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function handleEntryAction(event) {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      let result;
      if (action === 'generate') result = await api(`/content-entries/${id}/generate`, { method: 'POST' });
      if (action === 'approve') result = await api(`/content-entries/${id}/approve`, { method: 'POST' });
      if (action === 'reject') result = await api(`/content-entries/${id}/reject`, { method: 'POST' });
      if (action === 'delete') result = await api(`/content-entries/${id}`, { method: 'DELETE' });
      if (action === 'regenerate') {
        const feedback = document.getElementById(`feedback-${id}`).value;
        result = await api(`/content-entries/${id}/regenerate`, { method: 'POST', body: JSON.stringify({ feedback }) });
      }
      show(result || `${action} completed`);
      await loadCampaign(campaignSelect.value);
    }

    async function safe(task) {
      try { await task(); } catch (error) { show(`Error: ${error.message}`); }
    }

    document.getElementById('createCampaignBtn').addEventListener('click', () => safe(createCampaign));
    document.getElementById('refreshCampaignsBtn').addEventListener('click', () => safe(refreshCampaigns));
    document.getElementById('loadCampaignBtn').addEventListener('click', () => safe(loadCampaign));
    document.getElementById('generatePlanBtn').addEventListener('click', () => safe(generatePlan));
    entriesContainer.addEventListener('click', (event) => safe(() => handleEntryAction(event)));
    refreshCampaigns();
  </script>
</body>
</html>
